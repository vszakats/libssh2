environment:
  CMAKE_CONFIGURATION: 'Release'
  CMAKE_VERSION: 3.18.4
  CMAKE_SHA256: a932bc0c8ee79f1003204466c525b38a840424d4ae29f9e5fb88959116f2407d
  DO_NOT_TRACK: '1'
  DOCKER_CLI_VERSION: 29.4.1
  DOCKER_CLI_SHA256: 927cb16737c6b7916db15ce31789c0864cf86264a56f2655bae41faa25628d5b
  FIXTURE_XFER_COUNT: 35020
  SKIP_CTEST: 'no'  # Connection to test server has been failing consistently since 2024-08-29

  matrix:
    - job_name: 'VS2022, OpenSSL 3, x64, Server 2019, clang-cl'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2022'
      CMAKE_GENERATOR: 'Visual Studio 17 2022'
      CMAKE_GENERATE: '-A x64 -T ClangCl -DCRYPTO_BACKEND=OpenSSL -DOPENSSL_ROOT_DIR=C:/OpenSSL-v36-Win64'

    - job_name: 'VS2022, OpenSSL 3, x64, Server 2019'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2022'
      CMAKE_GENERATOR: 'Visual Studio 17 2022'
      CMAKE_GENERATE: '-A x64 -DCRYPTO_BACKEND=OpenSSL -DOPENSSL_ROOT_DIR=C:/OpenSSL-v30-Win64'

    - job_name: 'VS2015, OpenSSL 1.1, x86, Server 2016'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2017'
      CMAKE_GENERATOR: 'Visual Studio 14 2015'
      CMAKE_GENERATE: '-A Win32 -DCRYPTO_BACKEND=OpenSSL -DOPENSSL_ROOT_DIR=C:/OpenSSL-v111-Win32'

    - job_name: 'VS2015, OpenSSL 1.1, x64, Server 2012 R2, Debug-logging'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2015'
      CMAKE_GENERATOR: 'Visual Studio 14 2015'
      CMAKE_GENERATE: '-A x64 -DCRYPTO_BACKEND=OpenSSL -DOPENSSL_ROOT_DIR=C:/OpenSSL-v111-Win64 -DENABLE_DEBUG_LOGGING=ON'

    - job_name: 'VS2013, OpenSSL 1.1, x64, Server 2012 R2'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2015'
      CMAKE_GENERATOR: 'Visual Studio 12 2013'
      CMAKE_GENERATE: '-A x64 -DCRYPTO_BACKEND=OpenSSL -DOPENSSL_ROOT_DIR=C:/OpenSSL-v111-Win64'

    - job_name: 'VS2013, OpenSSL 1.1, x86, Server 2012 R2, Shared-only'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2015'
      CMAKE_GENERATOR: 'Visual Studio 12 2013'
      CMAKE_GENERATE: '-A Win32 -DCRYPTO_BACKEND=OpenSSL -DOPENSSL_ROOT_DIR=C:/OpenSSL-v111-Win32 -DBUILD_STATIC_LIBS=OFF'

    - job_name: 'VS2013, OpenSSL 1.1, x64, Build-only, Static-only'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2015'
      CMAKE_GENERATOR: 'Visual Studio 12 2013'
      CMAKE_GENERATE: '-A x64 -DCRYPTO_BACKEND=OpenSSL -DOPENSSL_ROOT_DIR=C:/OpenSSL-v111-Win64 -DBUILD_SHARED_LIBS=OFF'
      SKIP_CTEST: 'yes'

    - job_name: 'VS2010, WinCNG, x64, Build-only, non-unity'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2015'
      CMAKE_GENERATOR: 'Visual Studio 10 2010'
      CMAKE_GENERATE: '-A x64 -DCRYPTO_BACKEND=WinCNG -DENABLE_ECDSA_WINCNG=ON -DCMAKE_UNITY_BUILD=OFF'
      SKIP_CTEST: 'yes'

    - job_name: 'VS2022, WinCNG, x64, Server 2019, Debug-logging'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2022'
      CMAKE_GENERATOR: 'Visual Studio 17 2022'
      CMAKE_GENERATE: '-A x64 -DCRYPTO_BACKEND=WinCNG -DENABLE_DEBUG_LOGGING=ON'

    - job_name: 'VS2022, WinCNG, ARM64, Build-only'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2022'
      CMAKE_GENERATOR: 'Visual Studio 17 2022'
      CMAKE_GENERATE: '-A ARM64 -DCRYPTO_BACKEND=WinCNG -DENABLE_ECDSA_WINCNG=ON'
      SKIP_CTEST: 'yes'

    - job_name: 'VS2015, WinCNG, x64, Server 2012 R2'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2015'
      CMAKE_GENERATOR: 'Visual Studio 14 2015'
      CMAKE_GENERATE: '-A x64 -DCRYPTO_BACKEND=WinCNG'

    - job_name: 'VS2015, WinCNG, x86, Server 2016'
      APPVEYOR_BUILD_WORKER_IMAGE: 'Visual Studio 2017'
      CMAKE_GENERATOR: 'Visual Studio 14 2015'
      CMAKE_GENERATE: '-A Win32 -DCRYPTO_BACKEND=WinCNG -DENABLE_ECDSA_WINCNG=ON'

matrix:
  fast_finish: true

install:
  - ps: $env:PATH = "C:/my-cmake/bin;C:/my-docker/docker;$env:PATH"
  - ps: |
      # prepare local SSH server for reverse tunneling from GitHub Actions hosting our docker container
      $env:OPENSSH_SERVER_PORT = Get-Random -Minimum 2000 -Maximum 2300
      [System.Environment]::SetEnvironmentVariable('OPENSSH_SERVER_PORT', $env:OPENSSH_SERVER_PORT)

  - ps: |
      # Partially copied from https://github.com/appveyor/ci/blob/master/scripts/enable-rdp.ps1

      # get current IP
      $ip = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object {$_.InterfaceAlias -like 'ethernet*'}).IPAddress
      $port = 3389
      if($ip.StartsWith('172.24.')) {
        $port = 33800 + ($ip.split('.')[2] - 16) * 256 + $ip.split('.')[3]
      }
      elseif($ip.StartsWith('192.168.') -or $ip.StartsWith('10.240.')) {
        # new environment - behind NAT
        $port = 33800 + ($ip.split('.')[2] - 0) * 256 + $ip.split('.')[3]
      }
      elseif($ip.StartsWith('10.0.')) {
        $port = 33800 + ($ip.split('.')[2] - 0) * 256 + $ip.split('.')[3]
      }

      # get external IP
      $extip = (New-Object Net.WebClient).DownloadString('https://www.appveyor.com/tools/my-ip.aspx').Trim()

      # allow inbound traffic
      New-NetFirewallRule -DisplayName 'SSH via RDP port' -Direction Inbound -Action Allow -Protocol TCP -LocalPort 22,3389

      [System.Environment]::SetEnvironmentVariable('BRIDGE_IP', $ip)
      [System.Environment]::SetEnvironmentVariable('BRIDGE_EXTIP', $extip)
      [System.Environment]::SetEnvironmentVariable('BRIDGE_PORT', $port)

  - sh: |
      # launch remote docker daemon with reverse SSH tunnel
      netsh interface portproxy add v4tov4 listenport=3389 listenaddress="${BRIDGE_IP}" connectport=22 connectaddress=127.0.0.1
      netsh interface portproxy show all

      # ssh-keygen -b 2048 -t rsa -f auth -q -N '' && mkdir .ssh && mv auth.pub .ssh/authorized_keys
      ssh-keygen -t ed25519 -f auth -q -N '' && mkdir .ssh && mv auth.pub .ssh/authorized_keys
      ssh-keygen -A
      "$(command -v sshd)" &

      curl \
        -F account="${APPVEYOR_ACCOUNT_NAME}" \
        -F project="${APPVEYOR_PROJECT_SLUG}" \
        -F buildid="${APPVEYOR_BUILD_VERSION}" \
        -F base="${APPVEYOR_REPO_BRANCH}" \
        -F hash="${APPVEYOR_REPO_COMMIT}" \
        -F repo="${APPVEYOR_REPO_NAME}" \
        -F ssh_host="${BRIDGE_EXTIP}" \
        -F ssh_port="${BRIDGE_PORT}" \
        -F ssh_user="$(whoami)" \
        -F ssh_forward="127.0.0.1:${OPENSSH_SERVER_PORT} 127.0.0.1:${OPENSSH_SERVER_PORT},127.0.0.1:2375 /var/run/docker.sock" \
        -F ssh_hostkey="$(paste -d , /etc/ssh/ssh_host_*_key.pub)" \
        -F ssh_privkey="$(paste -sd , auth)" \
        -s 'https://stuff.marc-hoersken.de/libssh2/dispatch.php'

  - ps: |
      if($env:SKIP_CTEST -ne 'yes') {
        Write-Host 'Waiting for SSH connection from GitHub Actions' -NoNewline
        $endDate = (Get-Date).AddMinutes(5)
        while((Get-Process -Name 'sshd' -ErrorAction SilentlyContinue).Count -eq 1 -and (Get-Date) -lt $endDate) {
          Write-Host '.' -NoNewline
          Start-Sleep -Seconds 1
        }
        if((Get-Process -Name 'sshd' -ErrorAction SilentlyContinue).Count -gt 1) {
          $env:DOCKER_HOST = 'tcp://127.0.0.1:2375'
          [System.Environment]::SetEnvironmentVariable('DOCKER_HOST', $env:DOCKER_HOST)
          Write-Host '... ready.'
        }
        else {
          Write-Host '... failed.'
        }
      }

build_script:
  - cmd: sh -c ./appveyor.sh

test_script:
  - ps: |
      if($env:SKIP_CTEST -ne 'yes') {
        if($env:CMAKE_GENERATE -like '*WinCNG*') {
          $env:FIXTURE_TRACE_ALL_CONNECT = '1'
        }
        $env:OPENSSH_SERVER_IMAGE=[string] (& bash -c "echo ghcr.io/libssh2/ci_tests_openssh_server:$(git rev-parse --short=20 HEAD:tests/openssh_server)")
        cd _builds; ctest -VV -C $($env:CMAKE_CONFIGURATION) --output-on-failure --timeout 900
      }

on_failure:
  - ps: |
      if(Test-Path _builds/CMakeFiles/CMakeConfigureLog.yaml) { cat _builds/CMakeFiles/CMakeConfigureLog.yaml }
      if(Test-Path _builds/CMakeFiles/CMakeOutput.log) { cat _builds/CMakeFiles/CMakeOutput.log }
      if(Test-Path _builds/CMakeFiles/CMakeError.log) { cat _builds/CMakeFiles/CMakeError.log }

on_finish:
  - ps: |
      Get-Process -Name 'sleep' -ErrorAction SilentlyContinue | Stop-Process
      Start-Sleep -Seconds 3
      Get-Process -Name 'sshd' -ErrorAction SilentlyContinue | Stop-Process

skip_commits:
  files:
    - '.github/**/*'

clone_depth: 10

# Limit branches to avoid testing feature branches twice (as branch and as pull request)
branches:
  only:
    - master
